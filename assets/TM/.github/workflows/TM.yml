name: TM Magazine

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Pull latest changes
        run: git pull origin main
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xdg-utils xz-utils
          sudo apt-get install -y libxcb-cursor0 libxcb-xinerama0 libegl1 libopengl0
      - name: Install Calibre
        run: |
          sudo -v && wget -nv -O- https://download.calibre-ebook.com/linux-installer.sh | sudo sh /dev/stdin
          python -m venv venv
          source venv/bin/activate
          pip install requests beautifulsoup4
          python TIME.py

      - name: Fetch Magazine Epub
        run: |
          wget https://raw.githubusercontent.com/kovidgoyal/calibre/master/recipes/time_magazine.recipe -O TM.recipe
          python replace_TM.py
          ebook-convert TM.recipe output_raw.epub
          ebook-meta output_raw.epub > epub_metadata.txt
          ebook-meta output_raw.epub --get-cover=cover.jpg
      - name: Cleanup Epub
        run: |
          unzip -o output_raw.epub -d output_folder
          find output_folder -type f -name "*.html" -exec perl -pi -e 's|<div class="calibre\d+">\[video id=(\w+) autostart="viewable"\]</div>||g' {} \;
          find output_folder -type f -name "*.html" -exec perl -pi -e 's|<p class="calibre\d+"><a href="([^"]+)"[^>]*><em class="calibre\d+">(.{0,100})</em></a></p>||g' {} \;
          find output_folder -type f -name "*.html" -exec perl -pi -e 's|This article was downloaded by <strong[^>]*>calibre</strong> from ||g' {} \;
          perl -pi -e 's|calibre</dc:creator>|TIME</dc:creator>|g' output_folder/content.opf
          cd output_folder
          zip -X0 ../output.epub mimetype
          zip -r ../output.epub .
          cd ..
          rm -rf output_folder
      - name: Convert EPUB to PDF
        run: |
          ebook-convert output.epub output.pdf \
              --pdf-page-margin-top 30 \
              --pdf-page-margin-bottom 40 \
              --base-font-size 13 \
              --extra-css "styles_TM.css"
      - name: Create folder
        run: |
          full_title_date=$(grep "Title" epub_metadata.txt | awk -F'[][]' '{print $2}')
          date_only=$(date -d "$full_title_date" +"%Y-%m-%d")
          year=$(date -d "$date_only" +"%Y")
          folder_name=$date_only
          mkdir -p TM/"$year"/"$folder_name"
          mv output.epub TM/"$year"/"$folder_name"/TM_"$folder_name".epub
          mv output.pdf TM/"$year"/"$folder_name"/TM_"$folder_name".pdf
          mv cover.jpg TM/"$year"/"$folder_name"/


      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add TM/*
          git commit -m "Initial commit"
          git push
